<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bildschirm teilen</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #95a321;
      --primary-light: #b5c84a;
      --dark: #2a2a29;
      --gray: #f5f5f3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--dark);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* Idle screen: QR code + instructions */
    #idle-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 40px;
      padding: 40px;
    }

    #idle-screen.hidden { display: none; }

    .logo {
      width: 280px;
      margin-bottom: 10px;
    }

    .room-name {
      font-size: 1.4rem;
      color: var(--primary-light);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .qr-container {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    #qr-canvas {
      display: block;
    }

    .instructions {
      text-align: center;
      max-width: 600px;
    }

    .instructions h2 {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 24px;
      color: var(--primary-light);
    }

    .steps {
      display: flex;
      gap: 50px;
      justify-content: center;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .step-number {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .step-text {
      font-size: 1.1rem;
      color: #ccc;
      text-align: center;
      line-height: 1.4;
    }

    .pin-display {
      margin-top: 30px;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 8px;
    }

    .pin-display span {
      color: var(--primary-light);
      font-family: 'Courier New', monospace;
      font-size: 2.4rem;
    }

    .url-hint {
      margin-top: 12px;
      font-size: 1rem;
      color: #888;
    }

    .url-hint span {
      color: var(--primary-light);
      font-weight: 500;
    }

    /* Video stream (active sharing) */
    #video-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #video-screen.active, #image-screen.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #image-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #shared-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Connection status indicator */
    .status-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 100;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected { background: var(--primary); }
    .status-dot.streaming { background: #4CAF50; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Warte auf Verbindung...</span>
  </div>

  <div id="idle-screen">
    <img src="/logo.svg" alt="Hotel Park Soltau" class="logo">
    <div class="room-name" id="room-name"></div>
    <div class="qr-container">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="instructions">
      <h2>Bildschirm teilen</h2>
      <div class="steps">
        <div class="step">
          <div class="step-number">1</div>
          <div class="step-text">QR-Code<br>scannen</div>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <div class="step-text">Bildschirm<br>freigeben</div>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <div class="step-text">Pr&auml;sentation<br>starten</div>
        </div>
      </div>
      <div class="pin-display">PIN: <span id="room-pin">----</span></div>
      <div class="url-hint">Oder besuchen Sie: <span id="share-url"></span></div>
    </div>
  </div>

  <div id="video-screen">
    <video id="remote-video" autoplay playsinline></video>
  </div>

  <div id="image-screen">
    <img id="shared-image" src="" alt="Geteiltes Bild">
  </div>

  <!-- QR Code library -->
  <script src="/qrious.min.js"></script>
  <script src="/debug.js"></script>

  <script>
    const room = window.location.pathname.split('/')[1];
    const baseUrl = window.location.origin;
    const shareUrl = `${baseUrl}/${room}/share`;

    // Set room name
    document.getElementById('room-name').textContent = `Raum ${room}`;
    document.getElementById('share-url').textContent = shareUrl;

    // Fetch and display room PIN
    fetch(`/api/pin/${room}`)
      .then(r => r.json())
      .then(({ pin }) => { document.getElementById('room-pin').textContent = pin; })
      .catch(() => {});

    // Refresh PIN at midnight
    function msUntilMidnight() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      return midnight - now;
    }
    setTimeout(function refreshPin() {
      fetch(`/api/pin/${room}`)
        .then(r => r.json())
        .then(({ pin }) => { document.getElementById('room-pin').textContent = pin; })
        .catch(() => {});
      setTimeout(refreshPin, 24 * 60 * 60 * 1000);
    }, msUntilMidnight());

    // Generate QR code
    const qr = new QRious({
      element: document.getElementById('qr-canvas'),
      value: shareUrl,
      size: 280,
      level: 'M',
      foreground: '#2a2a29',
      background: '#ffffff'
    });

    // Socket.IO + WebRTC
    const socket = io();
    if (window.dbgWatchSocket) dbgWatchSocket(socket);

    let pc = null;
    let pendingCandidates = [];
    let iceConfig = { iceServers: [] };
    let iceConfigReady = false;
    let pendingOffer = null;

    fetch('/api/ice-config')
      .then(r => r.json())
      .then(config => {
        iceConfig = config;
        iceConfigReady = true;
        dbg(`ICE config loaded: ${JSON.stringify(config.iceServers.map(s => s.urls))}`, 'info');
        if (pendingOffer) {
          handleOffer(pendingOffer);
          pendingOffer = null;
        }
      })
      .catch(err => {
        console.warn('Failed to load ICE config:', err);
        iceConfigReady = true;
        if (pendingOffer) {
          handleOffer(pendingOffer);
          pendingOffer = null;
        }
      });

    // Join room on every (re)connect — socket.io auto-reconnects
    // but we need to re-register in the room after reconnect
    socket.on('connect', () => {
      dbg(`Socket connected: ${socket.id}`, 'signal');
      socket.emit('join', { room, type: 'display' });
    });

    function serializeCandidate(c) {
      return { candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex };
    }

    socket.on('offer', ({ offer }) => {
      if (!iceConfigReady) {
        pendingOffer = offer;
        return;
      }
      handleOffer(offer);
    });

    async function handleOffer(offer) {
      if (pc) {
        pc.ontrack = null;
        pc.onicecandidate = null;
        pc.onconnectionstatechange = null;
        pc.close();
        pc = null;
      }
      pendingCandidates = [];

      pc = new RTCPeerConnection(iceConfig);
      if (window.dbgWatchPc) dbgWatchPc(pc, 'display');

      pc.ontrack = (event) => {
        const video = document.getElementById('remote-video');
        if (video.srcObject !== event.streams[0]) {
          video.srcObject = event.streams[0];
        }
        document.getElementById('idle-screen').classList.add('hidden');
        document.getElementById('image-screen').classList.remove('active');
        document.getElementById('video-screen').classList.add('active');
        document.getElementById('status-dot').className = 'status-dot streaming';
        document.getElementById('status-text').textContent = 'Bildschirm wird geteilt';
      };

      pc.onicecandidate = (event) => {
        if (event.candidate && event.candidate.candidate) {
          socket.emit('ice-candidate', { room, candidate: serializeCandidate(event.candidate) });
        }
      };

      // Only stop on 'failed' — 'disconnected' is often temporary (ICE restart,
      // network glitch). WebRTC is peer-to-peer; it does NOT depend on the
      // signaling socket staying connected.
      pc.onconnectionstatechange = () => {
        if (!pc) return;
        const state = pc.connectionState;
        if (state === 'failed') {
          dbg('WebRTC failed — stopping', 'error');
          stopViewing();
        } else if (state === 'disconnected') {
          dbg('WebRTC disconnected — waiting 15s for recovery...', 'warn');
          setTimeout(() => {
            if (pc && pc.connectionState === 'disconnected') {
              dbg('WebRTC did not recover — stopping', 'error');
              stopViewing();
            }
          }, 15000);
        }
      };

      try {
        await pc.setRemoteDescription(offer);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('answer', { room, answer: { type: answer.type, sdp: answer.sdp } });

        for (const c of pendingCandidates) {
          await pc.addIceCandidate(c);
        }
        pendingCandidates = [];
      } catch (err) {
        console.error('Failed during offer handling:', err);
        stopViewing();
      }
    }

    socket.on('ice-candidate', async ({ candidate }) => {
      if (!candidate || !candidate.candidate) return;
      if (!pc || !pc.remoteDescription || !pc.remoteDescription.type || !pc.localDescription || !pc.localDescription.type) {
        pendingCandidates.push(candidate);
      } else {
        try {
          await pc.addIceCandidate(candidate);
        } catch (err) {
          console.error('Failed to add ICE candidate:', err);
        }
      }
    });

    socket.on('image-share', ({ image }) => {
      if (pc) {
        pc.ontrack = null;
        pc.onicecandidate = null;
        pc.onconnectionstatechange = null;
        pc.close();
        pc = null;
      }
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('shared-image').src = image;
      document.getElementById('idle-screen').classList.add('hidden');
      document.getElementById('video-screen').classList.remove('active');
      document.getElementById('image-screen').classList.add('active');
      document.getElementById('status-dot').className = 'status-dot streaming';
      document.getElementById('status-text').textContent = 'Bild wird angezeigt';
    });

    // Only stop video when we get an explicit stop signal — NOT on socket disconnect.
    // WebRTC streams are peer-to-peer and survive signaling channel outages.
    socket.on('sharing-stopped', () => {
      stopViewing();
    });

    socket.on('room-status', ({ hasSharer }) => {
      // Don't reset display if we have an active WebRTC connection
      // (the sharer might have just reconnected their socket)
      if (!hasSharer && (!pc || pc.connectionState !== 'connected')) {
        document.getElementById('status-dot').className = 'status-dot';
        document.getElementById('status-text').textContent = 'Warte auf Verbindung...';
      } else if (!hasSharer && pc && pc.connectionState === 'connected') {
        // Socket says no sharer but WebRTC is still active — keep streaming
        dbg('Socket reports no sharer but WebRTC still connected — keeping stream', 'warn');
      } else {
        document.getElementById('status-dot').className = 'status-dot connected';
        document.getElementById('status-text').textContent = 'Verbindung wird hergestellt...';
      }
    });

    function stopViewing() {
      pendingCandidates = [];
      if (pc) {
        pc.ontrack = null;
        pc.onicecandidate = null;
        pc.onconnectionstatechange = null;
        pc.close();
        pc = null;
      }
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('idle-screen').classList.remove('hidden');
      document.getElementById('video-screen').classList.remove('active');
      document.getElementById('image-screen').classList.remove('active');
      document.getElementById('shared-image').src = '';
      document.getElementById('status-dot').className = 'status-dot';
      document.getElementById('status-text').textContent = 'Warte auf Verbindung...';
    }
  </script>
</body>
</html>
