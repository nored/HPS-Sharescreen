<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareScreen Admin</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #95a321; --dark: #2a2a29; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; color: var(--dark); min-height: 100vh; }
    .header { background: var(--dark); padding: 20px; display: flex; align-items: center; justify-content: center; gap: 16px; }
    .header img { height: 40px; }
    .header h1 { color: #fff; font-size: 1.2rem; font-weight: 400; }
    .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
    .room-grid { display: grid; gap: 16px; }
    .room-card { background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; }
    .room-info { display: flex; flex-direction: column; gap: 8px; }
    .room-name { font-size: 1.3rem; font-weight: 600; }
    .room-pin { font-family: 'Courier New', monospace; color: var(--primary); font-weight: 600; }
    .room-status { display: flex; gap: 16px; font-size: 0.85rem; }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4CAF50; }
    .dot.off { background: #ccc; }
    .room-actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
    .btn-reboot { background: #ff9800; color: #fff; }
    .btn-reboot:hover { background: #f57c00; }
    .btn-reboot:disabled { background: #ccc; cursor: not-allowed; }
    .btn-clear { background: #e0e0e0; color: #333; }
    .btn-clear:hover { background: #d0d0d0; }
    .btn-remove { background: #d32f2f; color: #fff; }
    .btn-remove:hover { background: #b71c1c; }
    .btn-setup { background: #1565c0; color: #fff; }
    .btn-setup:hover { background: #0d47a1; }
    .btn-update { background: #7b1fa2; color: #fff; }
    .btn-update:hover { background: #6a1b9a; }
    .btn-update:disabled { background: #ccc; cursor: not-allowed; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 1.2rem; margin-bottom: 16px; }
    .modal pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; white-space: pre; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .btn-copy { background: var(--primary); color: #fff; }
    .btn-copy:hover { background: #7a8619; }
    .btn-close { background: #e0e0e0; color: #333; }
    .btn-close:hover { background: #d0d0d0; }
    .update-banner { display: none; background: #ff9800; color: #fff; padding: 12px 20px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9rem; align-items: center; gap: 10px; }
    .update-banner.show { display: flex; }
    .update-banner strong { font-weight: 600; }
    .add-room { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-room input { flex: 1; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; }
    .add-room input:focus { border-color: var(--primary); }
    .btn-add { background: var(--primary); color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; }
    .btn-add:hover { background: #7a8619; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--dark); color: #fff; padding: 12px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; font-size: 0.9rem; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/logo.svg" alt="Hotel Park Soltau">
    <h1>ShareScreen Admin</h1>
  </div>
  <div class="container">
    <div class="update-banner" id="update-banner">
      <strong>Update verf&uuml;gbar!</strong> <span id="update-info"></span>
    </div>
    <div class="add-room">
      <input type="text" id="new-room-input" placeholder="Neuer Raum (z.B. Sylt)" onkeydown="if(event.key==='Enter')addRoom()">
      <button class="btn-add" onclick="addRoom()">Raum hinzuf&uuml;gen</button>
    </div>
    <div class="room-grid" id="room-grid"></div>
  </div>
  <div class="modal-overlay" id="setup-modal" onclick="if(event.target===this)closeSetup()">
    <div class="modal">
      <h2 id="setup-title"></h2>
      <pre id="setup-config"></pre>
      <div class="modal-actions">
        <button class="btn btn-copy" onclick="copySetup()">Kopieren</button>
        <button class="btn btn-close" onclick="closeSetup()">Schlie&szlig;en</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const socket = io();
    let roomData = {};

    socket.on('connect', () => {
      socket.emit('join', { room: '__admin', type: 'admin' });
    });

    socket.on('admin-status', (data) => {
      roomData = data;
      render();
    });

    socket.on('admin-toast', ({ message }) => {
      showToast(message);
    });

    function render() {
      const grid = document.getElementById('room-grid');
      grid.innerHTML = '';
      for (const [room, info] of Object.entries(roomData)) {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.innerHTML = `
          <div class="room-info">
            <div class="room-name">${room} <span class="room-pin">PIN: ${info.pin}</span></div>
            <div class="room-status">
              <div class="status-item"><div class="dot ${info.display ? 'on' : 'off'}"></div>Display</div>
              <div class="status-item"><div class="dot ${info.sharer ? 'on' : 'off'}"></div>Sharer</div>
            </div>
          </div>
          <div class="room-actions">
            <button class="btn btn-setup" onclick="showSetup('${room}')">Setup</button>
            <button class="btn btn-update" onclick="updatePi('${room}')" ${info.display ? '' : 'disabled'}>Update Pi</button>
            <button class="btn btn-reboot" onclick="rebootPi('${room}')" ${info.display ? '' : 'disabled'}>Reboot Pi</button>
            <button class="btn btn-clear" onclick="clearIdle('${room}')">Idle neu</button>
            <button class="btn btn-remove" onclick="removeRoom('${room}')">Entfernen</button>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    function rebootPi(room) {
      if (!confirm(`Pi in Raum ${room} wirklich neustarten?`)) return;
      socket.emit('admin-reboot', { room });
      showToast(`Reboot für ${room} gesendet...`);
    }

    function updatePi(room) {
      if (!confirm(`Receiver in Raum ${room} aktualisieren? Der Pi baut neu und startet dann neu.`)) return;
      socket.emit('admin-update-pi', { room });
      showToast(`Update für ${room} gesendet — Build dauert ca. 1-2 Minuten`);
    }

    function clearIdle(room) {
      socket.emit('admin-clear-idle', { room });
      showToast(`Idle-Bild für ${room} wird neu generiert`);
    }

    function addRoom() {
      const input = document.getElementById('new-room-input');
      const name = input.value.trim();
      if (!name) return;
      socket.emit('admin-add-room', { room: name });
      input.value = '';
      showToast(`Raum "${name}" hinzugefügt`);
    }

    function removeRoom(room) {
      if (!confirm(`Raum "${room}" wirklich entfernen?`)) return;
      socket.emit('admin-remove-room', { room });
      showToast(`Raum "${room}" entfernt`);
    }

    function showSetup(room) {
      const hostname = room.toLowerCase().replace(/[^a-z0-9]/g, '') + '-stream';
      const config = `# === Inventory: hosts.yml ===
all:
  hosts:
    ${hostname}:
      ansible_host: ${hostname}.local
      ansible_user: pi
      ansible_password: raspberry
      sharescreen_room: "${room}"
      sharescreen_server: "https://share.hotel-park-soltau.de"

# === Playbook: setup-pi.yml ===
- name: ShareScreen Pi Setup — ${room}
  hosts: ${hostname}
  become: true
  vars:
    receiver_src: ./receiver
  tasks:
    - name: Install GStreamer and build dependencies
      apt:
        update_cache: true
        pkg:
          - build-essential
          - cmake
          - pkg-config
          - libgstreamer1.0-dev
          - libgstreamer-plugins-base1.0-dev
          - libgstreamer-plugins-bad1.0-dev
          - gstreamer1.0-plugins-base
          - gstreamer1.0-plugins-good
          - gstreamer1.0-plugins-bad
          - gstreamer1.0-nice
          - libsoup-3.0-dev
          - libjson-glib-dev
          - curl

    - name: Configure gpu_mem=128
      lineinfile:
        path: /boot/firmware/config.txt
        regexp: "^gpu_mem="
        line: "gpu_mem=128"

    - name: Add HDMI config
      blockinfile:
        path: /boot/firmware/config.txt
        marker: "# {mark} ShareScreen"
        block: |
          hdmi_force_hotplug=1
          hdmi_group=1
          hdmi_mode=16

    - name: Silent boot — console to tty3
      replace:
        path: /boot/firmware/cmdline.txt
        regexp: "console=tty1"
        replace: "console=tty3"

    - name: Silent boot — add quiet params
      replace:
        path: /boot/firmware/cmdline.txt
        regexp: "(rootwait)(?! quiet)"
        replace: "\\\\1 quiet loglevel=0 logo.nologo vt.global_cursor_default=0 consoleblank=0"

    - name: Kernel tuning
      copy:
        dest: /etc/sysctl.d/99-sharescreen.conf
        content: |
          vm.swappiness=10
          net.core.rmem_max=2500000
      notify: reload sysctl

    - name: Disable getty on tty1
      systemd:
        name: getty@tty1
        enabled: false

    - name: Copy receiver source
      synchronize:
        src: "{{ receiver_src }}/"
        dest: /home/pi/receiver/
        delete: true

    - name: Build receiver
      shell: |
        cd /home/pi/receiver
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
      args:
        creates: /home/pi/receiver/build/sharescreen-receiver

    - name: Install receiver binary
      copy:
        src: /home/pi/receiver/build/sharescreen-receiver
        dest: /usr/local/bin/sharescreen-receiver
        remote_src: true
        mode: "0755"

    - name: Write room config
      copy:
        dest: /home/pi/.sharescreen-room
        content: "{{ sharescreen_room }}"
        owner: pi
        group: pi

    - name: Install systemd service
      template:
        src: sharescreen.service.j2
        dest: /etc/systemd/system/sharescreen.service
      notify: restart sharescreen

  handlers:
    - name: reload sysctl
      command: sysctl --system

    - name: restart sharescreen
      systemd:
        name: sharescreen
        state: restarted
        enabled: true
        daemon_reload: true

# === Template: sharescreen.service.j2 ===
[Unit]
Description=ShareScreen WebRTC Receiver
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=root
Environment=HOME=/home/pi
Environment=SHARESCREEN_SERVER={{ sharescreen_server }}
Environment=XDG_RUNTIME_DIR=/run/user/0
ExecStartPre=/bin/sh -c 'echo performance > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || true'
ExecStart=/usr/bin/stdbuf -oL /usr/local/bin/sharescreen-receiver {{ sharescreen_room }}
Nice=-20
Restart=always
RestartSec=5
TimeoutStopSec=5

[Install]
WantedBy=multi-user.target`;

      document.getElementById('setup-title').textContent = `Ansible Setup — Raum ${room}`;
      document.getElementById('setup-config').textContent = config;
      document.getElementById('setup-modal').classList.add('show');
    }

    function copySetup() {
      const text = document.getElementById('setup-config').textContent;
      navigator.clipboard.writeText(text).then(() => showToast('Ansible-Config kopiert'));
    }

    function closeSetup() {
      document.getElementById('setup-modal').classList.remove('show');
    }

    // Check if GitHub is ahead of running server
    async function checkForUpdates() {
      try {
        const [versionRes, githubRes] = await Promise.all([
          fetch('/api/version').then(r => r.json()),
          fetch('https://api.github.com/repos/nored/HPS-Sharescreen/commits/main').then(r => r.json())
        ]);
        const running = versionRes.commit;
        const latest = githubRes.sha?.substring(0, 7);
        const message = githubRes.commit?.message?.split('\n')[0];
        if (running === 'unknown' || !latest) return;
        if (!githubRes.sha.startsWith(running)) {
          document.getElementById('update-info').textContent =
            `Server: ${running.substring(0,7)} — GitHub: ${latest} (${message})`;
          document.getElementById('update-banner').classList.add('show');
        }
      } catch {}
    }
    checkForUpdates();
    setInterval(checkForUpdates, 5 * 60 * 1000);

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
