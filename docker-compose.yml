services:
  sharescreen:
    build: .
    container_name: hps-sharescreen
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /mnt/data/hps-sharescreen:/app/data
    environment:
      - PORT=3000
      - BASE_URL=https://share.hotel-park-soltau.de
      - ROOMS=Kiel,Hamburg,Bremen,Heide,Lübeck

