services:
  sharescreen:
    build: .
    container_name: hps-sharescreen
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /mnt/data/hps-sharescreen:/app/data
    environment:
      - PORT=3000
      - BASE_URL=https://share.hotel-park-soltau.de
      - ROOMS=Kiel,Hamburg,Bremen,Heide,Lübeck
      - TURN_HOST=share.hotel-park-soltau.de
      - TURN_PORT=3478
      - TURN_USER=sharescreen
      - TURN_PASS=hotelparkshare2024

  coturn:
    image: coturn/coturn
    container_name: hps-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
