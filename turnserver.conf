# TURN server configuration for intranet screen sharing
listening-port=3478
# No TLS needed — traffic stays on the LAN
no-tls
no-dtls
# Use the host's IP (network_mode: host)
# relay-ip and listening-ip will auto-detect

# Authentication
lt-cred-mech
user=sharescreen:hotelparkshare2024
realm=share.hotel-park-soltau.de

# Only allow relay to private/intranet IPs
no-multicast-peers

# Logging
log-file=stdout
verbose

# Performance
total-quota=100
max-bps=0
