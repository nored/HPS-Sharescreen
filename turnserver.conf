# TURN server configuration for intranet screen sharing
listening-port=3478

# TURN relay needs UDP ports for media
min-port=49152
max-port=49252

# No TLS needed — traffic stays on the LAN
no-tls
no-dtls

# Authentication
lt-cred-mech
user=sharescreen:hotelparkshare2024
realm=share.hotel-park-soltau.de

# Allow TURN (not just STUN)
# Fingerprint is required for WebRTC
fingerprint

# Only allow relay to private/intranet IPs
no-multicast-peers

# Logging
log-file=stdout
verbose

# Performance
total-quota=100
max-bps=0
